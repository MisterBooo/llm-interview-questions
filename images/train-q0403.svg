<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>SFT 后置信度下降原因</title>
  <desc>SFT后置信度变平不等于性能下降，应联合准确率、NLL、Brier、ECE和分桶漂移诊断原因。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">SFT 后预测变平：先分清置信、准确率与校准</text>

  <!-- SFT 前 柱状（尖锐） -->
  <text x="50" y="90" font-size="13" font-weight="500" fill="#111827">SFT 前：分布尖锐（不代表必然过自信）</text>
  <g fill="#6366F1">
    <rect x="56" y="118" width="28" height="92"/>
    <rect x="96" y="196" width="28" height="14"/>
    <rect x="136" y="200" width="28" height="10"/>
    <rect x="176" y="188" width="28" height="22"/>
    <rect x="216" y="200" width="28" height="10"/>
  </g>
  <line x1="50" y1="210" x2="252" y2="210" stroke="#9CA3AF" stroke-width="1.2"/>

  <!-- SFT 后 柱状（平缓） -->
  <text x="50" y="250" font-size="13" font-weight="500" fill="#111827">SFT 后：分布平缓（置信度↓）</text>
  <g fill="#9CA3AF">
    <rect x="56" y="304" width="28" height="36"/>
    <rect x="96" y="312" width="28" height="28"/>
    <rect x="136" y="298" width="28" height="42"/>
    <rect x="176" y="310" width="28" height="30"/>
    <rect x="216" y="316" width="28" height="24"/>
  </g>
  <line x1="50" y1="340" x2="252" y2="340" stroke="#9CA3AF" stroke-width="1.2"/>

  <!-- 右侧原因/处理 -->
  <text x="320" y="104" font-size="14" font-weight="600" fill="#111827">可能原因（置信度下降）</text>
  <text x="320" y="132" font-size="12.5" fill="#4B5563">· 数据分布偏移 / 噪声标签 → 概率被拉平</text>
  <text x="320" y="156" font-size="12.5" fill="#4B5563">· 软标签/正则、class weighting 或 logit 尺度变化</text>
  <text x="320" y="180" font-size="12.5" fill="#4B5563">· 分类头重置、学习率、冻结组合或训练不足</text>

  <rect x="320" y="208" width="440" height="92" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="336" y="232" font-size="14" font-weight="600" fill="#6366F1">诊断与处理</text>
  <text x="336" y="258" font-size="12.5" fill="#4B5563">· 先比 accuracy/F1、NLL、Brier、ECE 与可靠性图</text>
  <text x="336" y="282" font-size="12.5" fill="#4B5563">· 在独立校准集拟合温度；它不改变分类边界</text>

  <text x="40" y="396" font-size="12" fill="#9CA3AF">钉子：分布变平只表示平均置信度下降；若更接近真实正确率，校准反而可能改善。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
