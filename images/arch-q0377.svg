<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>自回归生成用 token id 还是概率分布?</title>
  <desc>自回归解码下一步输入已选离散token而非完整概率分布，采样策略只决定如何选择该token。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">自回归解码：每步输入是离散 token id，不是概率分布</text>

  <rect x="40" y="92" width="120" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="100" y="125" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">第 i 步 logits</text>

  <rect x="200" y="92" width="156" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="278" y="125" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">softmax → 概率分布</text>

  <rect x="396" y="92" width="120" height="56" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="456" y="125" font-size="13.5" font-weight="500" fill="#6366F1" text-anchor="middle">argmax / 采样</text>

  <rect x="556" y="92" width="140" height="56" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="626" y="125" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">确定的 token id</text>

  <line x1="160" y1="120" x2="200" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="356" y1="120" x2="396" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="516" y1="120" x2="556" y2="120" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- 回环：token id 作为下一步输入 -->
  <path d="M626,148 L626,182 L100,182 L100,148" fill="none" stroke="#6366F1" stroke-width="1.5" stroke-dasharray="5,4" marker-end="url(#arrow)"/>
  <text x="363" y="176" font-size="12.5" fill="#6366F1" text-anchor="middle">把 id 作为第 i+1 步的输入（自回归）</text>

  <!-- 为什么不能传分布 -->
  <rect x="40" y="208" width="430" height="104" rx="8" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="56" y="232" font-size="14" font-weight="600" fill="#111827">为什么标准解码选离散 id？</text>
  <text x="56" y="258" font-size="12.5" fill="#4B5563">· 与离散 next-token 训练目标和 Embedding 输入分布一致</text>
  <text x="56" y="282" font-size="12.5" fill="#4B5563">· 若传期望 embedding pᵀE，会混合多个词义并改变输入分布</text>
  <text x="68" y="302" font-size="12.5" fill="#4B5563">精确保留多个离散分支时，才要像 Beam 一样分别维护状态</text>

  <!-- 暴露偏差 -->
  <rect x="490" y="208" width="270" height="104" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="506" y="232" font-size="14" font-weight="600" fill="#111827">训练 vs 推理</text>
  <text x="506" y="258" font-size="12.5" fill="#4B5563">训练：teacher forcing 喂真值，可反传</text>
  <text x="506" y="282" font-size="12.5" fill="#4B5563">推理：喂自己生成的 id，无梯度</text>
  <text x="506" y="302" font-size="12.5" fill="#DC6803">→ 前缀分布不同，即「暴露偏差」</text>

  <text x="40" y="356" font-size="12" fill="#9CA3AF">钉子：软输入或 Gumbel-Softmax 可作连续近似，但会引入词义混合和词表级计算/存储。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
