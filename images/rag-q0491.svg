<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 380" font-family="-apple-system, system-ui, sans-serif">
  <title>BM25+向量+Cross-Encoder 怎么组合?</title>
  <desc>BM25 负责关键词精确召回，向量检索补充语义召回，RRF 融合两路排名后由 Cross-Encoder 对小候选集重排。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">混合检索：稀疏 + 稠密 → 融合 → 精排</text>

  <!-- query -->
  <rect x="40" y="158" width="100" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="90" y="190" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">query</text>

  <!-- two recall paths -->
  <rect x="180" y="96" width="190" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="275" y="121" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">BM25 稀疏检索</text>
  <text x="275" y="140" font-size="12" fill="#4B5563" text-anchor="middle">关键词 / 实体精确</text>

  <rect x="180" y="220" width="190" height="56" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="275" y="245" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">向量稠密检索</text>
  <text x="275" y="264" font-size="12" fill="#4B5563" text-anchor="middle">语义相似</text>

  <line x1="140" y1="178" x2="180" y2="124" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="140" y1="194" x2="180" y2="248" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- RRF -->
  <rect x="410" y="158" width="130" height="56" rx="8" fill="#FFF7ED" stroke="#F59E0B"/>
  <text x="475" y="183" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">RRF 融合</text>
  <text x="475" y="202" font-size="12" fill="#4B5563" text-anchor="middle">倒数排名融合</text>
  <line x1="370" y1="124" x2="410" y2="178" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="370" y1="248" x2="410" y2="196" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- rerank -->
  <rect x="580" y="158" width="180" height="56" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="670" y="183" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">Cross-encoder 精排</text>
  <text x="670" y="202" font-size="12" fill="#4B5563" text-anchor="middle">→ Top-K</text>
  <line x1="540" y1="186" x2="580" y2="186" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- nail -->
  <text x="40" y="332" font-size="12" fill="#9CA3AF">钉子：稀疏（关键词）与稠密（语义）互补，RRF 融合两路排名，再 cross-encoder 精排——工业级 RAG 检索骨架。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="370" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
