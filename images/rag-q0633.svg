<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>MRR 在 RAG 中怎么定义?</title>
  <desc>MRR 是各查询首个相关结果倒数排名的平均值，强调首个命中的排序位置，但不能代表端到端回答质量。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">MRR：首个相关结果排得越靠前，分越高</text>

  <!-- legend -->
  <rect x="40" y="60" width="13" height="13" rx="2" fill="#ECFDF5" stroke="#10B981"/>
  <text x="60" y="71" font-size="12" fill="#4B5563">= 首个相关文档</text>
  <text x="200" y="71" font-size="12" fill="#9CA3AF">方框内数字 = 排名位次</text>

  <!-- rows -->
  <!-- Q1: hit at rank 1 -->
  <text x="40" y="115" font-size="14" font-weight="500" fill="#111827">查询 1</text>
  <rect x="120" y="96" width="46" height="32" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="143" y="117" font-size="13" fill="#111827" text-anchor="middle">1</text>
  <rect x="172" y="96" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="195" y="117" font-size="13" fill="#9CA3AF" text-anchor="middle">2</text>
  <rect x="224" y="96" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="247" y="117" font-size="13" fill="#9CA3AF" text-anchor="middle">3</text>
  <rect x="276" y="96" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="299" y="117" font-size="13" fill="#9CA3AF" text-anchor="middle">4</text>
  <rect x="328" y="96" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="351" y="117" font-size="13" fill="#9CA3AF" text-anchor="middle">5</text>
  <text x="470" y="117" font-size="14" fill="#4B5563">RR = 1/1 = <tspan font-weight="500" fill="#6366F1">1.00</tspan></text>

  <!-- Q2: hit at rank 3 -->
  <text x="40" y="170" font-size="14" font-weight="500" fill="#111827">查询 2</text>
  <rect x="120" y="151" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="143" y="172" font-size="13" fill="#9CA3AF" text-anchor="middle">1</text>
  <rect x="172" y="151" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="195" y="172" font-size="13" fill="#9CA3AF" text-anchor="middle">2</text>
  <rect x="224" y="151" width="46" height="32" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="247" y="172" font-size="13" fill="#111827" text-anchor="middle">3</text>
  <rect x="276" y="151" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="299" y="172" font-size="13" fill="#9CA3AF" text-anchor="middle">4</text>
  <rect x="328" y="151" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="351" y="172" font-size="13" fill="#9CA3AF" text-anchor="middle">5</text>
  <text x="470" y="172" font-size="14" fill="#4B5563">RR = 1/3 ≈ <tspan font-weight="500" fill="#6366F1">0.33</tspan></text>

  <!-- Q3: hit at rank 2 -->
  <text x="40" y="225" font-size="14" font-weight="500" fill="#111827">查询 3</text>
  <rect x="120" y="206" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="143" y="227" font-size="13" fill="#9CA3AF" text-anchor="middle">1</text>
  <rect x="172" y="206" width="46" height="32" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="195" y="227" font-size="13" fill="#111827" text-anchor="middle">2</text>
  <rect x="224" y="206" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="247" y="227" font-size="13" fill="#9CA3AF" text-anchor="middle">3</text>
  <rect x="276" y="206" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="299" y="227" font-size="13" fill="#9CA3AF" text-anchor="middle">4</text>
  <rect x="328" y="206" width="46" height="32" rx="6" fill="#F3F4F6" stroke="#E5E7EB"/><text x="351" y="227" font-size="13" fill="#9CA3AF" text-anchor="middle">5</text>
  <text x="470" y="227" font-size="14" fill="#4B5563">RR = 1/2 = <tspan font-weight="500" fill="#6366F1">0.50</tspan></text>

  <!-- summary -->
  <line x1="40" y1="266" x2="760" y2="266" stroke="#E5E7EB"/>
  <text x="40" y="304" font-size="17" font-weight="500" fill="#6366F1">MRR = (1.00 + 0.33 + 0.50) / 3 ≈ 0.61</text>
  <text x="40" y="330" font-size="12" fill="#9CA3AF">对所有查询的「首个相关结果倒数排名」取平均——首位命中越多，MRR 越高。</text>

  <text x="40" y="372" font-size="12" fill="#9CA3AF">钉子：MRR 是检索排序指标，不等于端到端答案质量，需配合 Recall@K 一起看。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
