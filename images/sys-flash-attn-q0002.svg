<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>Flash Attention 原理怎么理解?</title>
  <desc>FlashAttention 分块计算 Q、K、V 并用在线 softmax 累积，不物化完整注意力矩阵，从而减少 HBM I/O。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">Flash Attention：分块进 SRAM 算，省 HBM 读写</text>

  <!-- memory hierarchy hint -->
  <rect x="40" y="62" width="200" height="30" rx="6" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="140" y="82" font-size="12" fill="#111827" text-anchor="middle">SRAM 小而快（片上）</text>
  <text x="252" y="82" font-size="12" fill="#9CA3AF">存储层级</text>
  <rect x="330" y="62" width="200" height="30" rx="6" fill="#F3F4F6" stroke="#9CA3AF"/>
  <text x="430" y="82" font-size="12" fill="#111827" text-anchor="middle">HBM 大而慢（显存）</text>

  <!-- standard card -->
  <rect x="40" y="112" width="350" height="250" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="58" y="140" font-size="15" font-weight="500" fill="#111827">标准注意力</text>
  <rect x="100" y="156" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="215" y="180" font-size="13" fill="#111827" text-anchor="middle">Q · K · V</text>
  <rect x="100" y="216" width="230" height="44" rx="6" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="215" y="241" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">物化 N×N 分数矩阵（存 HBM）</text>
  <rect x="100" y="284" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="215" y="308" font-size="13" fill="#111827" text-anchor="middle">softmax → 输出</text>
  <line x1="215" y1="192" x2="215" y2="216" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="215" y1="260" x2="215" y2="284" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="215" y="344" font-size="12" fill="#EF4444" text-anchor="middle">瓶颈：N×N 反复读写 HBM（慢）</text>

  <!-- flash card -->
  <rect x="410" y="112" width="350" height="250" rx="10" fill="#FFFFFF" stroke="#6366F1"/>
  <text x="428" y="140" font-size="15" font-weight="500" fill="#111827">Flash Attention</text>
  <rect x="470" y="156" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="585" y="180" font-size="13" fill="#111827" text-anchor="middle">Q / K / V 切块</text>
  <rect x="470" y="216" width="230" height="44" rx="6" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="585" y="234" font-size="12.5" font-weight="500" fill="#111827" text-anchor="middle">逐块载入 SRAM 内算</text>
  <text x="585" y="251" font-size="12" fill="#4B5563" text-anchor="middle">online softmax 累加</text>
  <rect x="470" y="284" width="230" height="36" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="585" y="308" font-size="13" fill="#111827" text-anchor="middle">累加 → 输出</text>
  <line x1="585" y1="192" x2="585" y2="216" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="585" y1="260" x2="585" y2="284" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="585" y="344" font-size="12" fill="#6366F1" text-anchor="middle">不物化 N×N → HBM 读写大减</text>

  <!-- nail -->
  <text x="40" y="404" font-size="12" fill="#9CA3AF">钉子：FlashAttention 保持稠密注意力主 FLOPs，减少 HBM I/O；实际加速取决于硬件与 shape。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
