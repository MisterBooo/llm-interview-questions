<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>Reward Model 训练流程详解</title>
  <desc>奖励模型用同一提示下的偏好回答对和 Bradley-Terry 损失学习相对分数，在 RLHF 中作为终局奖励并配合参考策略 KL 约束。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">奖励模型：把人类偏好学成「相对打分」</text>

  <!-- prompt -->
  <rect x="40" y="74" width="120" height="60" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="100" y="100" font-size="13" fill="#111827" text-anchor="middle">Prompt</text>
  <text x="100" y="120" font-size="11" fill="#9CA3AF" text-anchor="middle">SFT 模型采样</text>

  <!-- two responses -->
  <line x1="160" y1="92" x2="196" y2="92" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="116" x2="196" y2="116" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="198" y="70" width="150" height="36" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="273" y="93" font-size="13" fill="#111827" text-anchor="middle">回答 A（人选：更好）</text>
  <rect x="198" y="116" width="150" height="36" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="273" y="139" font-size="13" fill="#111827" text-anchor="middle">回答 B（较差）</text>
  <text x="273" y="172" font-size="12" fill="#9CA3AF" text-anchor="middle">人工 pairwise 标注：A ≻ B</text>

  <!-- RM scoring -->
  <line x1="348" y1="88" x2="412" y2="105" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="348" y1="134" x2="412" y2="117" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="414" y="78" width="150" height="66" rx="10" fill="#FFFFFF" stroke="#6366F1"/>
  <text x="489" y="104" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">Reward Model</text>
  <text x="489" y="126" font-size="11.5" fill="#6366F1" text-anchor="middle">输出标量分 r(prompt, resp)</text>

  <!-- loss -->
  <line x1="564" y1="111" x2="606" y2="111" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="608" y="72" width="152" height="78" rx="10" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="684" y="96" font-size="12.5" font-weight="500" fill="#111827" text-anchor="middle">Pairwise Loss</text>
  <text x="684" y="120" font-size="13" fill="#6366F1" text-anchor="middle">L = −log σ( r(A) − r(B) )</text>
  <text x="684" y="140" font-size="11" fill="#9CA3AF" text-anchor="middle">Bradley-Terry 建模</text>

  <!-- divider note -->
  <text x="400" y="210" font-size="12.5" fill="#4B5563" text-anchor="middle">学的是「A 比 B 好」的相对偏好，不是绝对质量分</text>

  <!-- feed RLHF -->
  <rect x="120" y="236" width="560" height="92" rx="10" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="400" y="262" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">训练好的 RM → 在 RLHF 里提供奖励信号</text>
  <rect x="150" y="278" width="180" height="38" rx="6" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="240" y="302" font-size="12.5" fill="#111827" text-anchor="middle">RM 打分 = 奖励 r</text>
  <text x="365" y="302" font-size="20" fill="#9CA3AF" text-anchor="middle">+</text>
  <rect x="400" y="278" width="230" height="38" rx="6" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="515" y="302" font-size="12.5" fill="#111827" text-anchor="middle">KL 约束：别偏离 SFT 太远</text>

  <text x="40" y="406" font-size="12" fill="#9CA3AF">结论：DPO 不显式训练 RM/PPO，但 policy-reference 对数概率比仍来自带 KL 正则的偏好目标。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
