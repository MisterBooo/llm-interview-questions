<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>PyTorch 动态图怎么自动微分?</title>
  <desc>PyTorch在前向执行时动态记录自动微分图，反向按链式法则累积梯度并在下一轮重新建图。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrowp" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366F1"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">PyTorch 动态计算图：Define-by-Run + 自动微分</text>

  <text x="40" y="72" font-size="12.5" fill="#6366F1">前向执行时记录参与求导的运算与张量依赖 →</text>

  <!-- DAG -->
  <rect x="40" y="104" width="44" height="30" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="62" y="124" font-size="13" fill="#111827" text-anchor="middle">b</text>
  <rect x="40" y="156" width="44" height="30" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="62" y="176" font-size="13" fill="#111827" text-anchor="middle">c</text>
  <circle cx="140" cy="140" r="18" fill="#F3F4F6" stroke="#9CA3AF"/><text x="140" y="146" font-size="15" fill="#111827" text-anchor="middle">+</text>
  <rect x="194" y="125" width="44" height="30" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="216" y="145" font-size="13" fill="#111827" text-anchor="middle">a</text>
  <rect x="194" y="78" width="44" height="30" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="216" y="98" font-size="13" fill="#111827" text-anchor="middle">e</text>
  <circle cx="300" cy="125" r="18" fill="#F3F4F6" stroke="#9CA3AF"/><text x="300" y="131" font-size="15" fill="#111827" text-anchor="middle">×</text>
  <rect x="352" y="110" width="44" height="30" rx="6" fill="#FFFFFF" stroke="#E5E7EB"/><text x="374" y="130" font-size="13" fill="#111827" text-anchor="middle">d</text>
  <rect x="448" y="110" width="66" height="30" rx="6" fill="#ECFDF5" stroke="#10B981"/><text x="481" y="130" font-size="13" fill="#111827" text-anchor="middle">loss</text>

  <line x1="84" y1="119" x2="124" y2="134" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="84" y1="171" x2="124" y2="146" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="158" y1="140" x2="194" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="238" y1="140" x2="284" y2="129" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="238" y1="98" x2="284" y2="118" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="318" y1="125" x2="352" y2="125" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="396" y1="125" x2="448" y2="125" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="200" y="172" font-size="11" fill="#6B7280">a.grad_fn = AddBackward</text>

  <!-- 反向 -->
  <path d="M481,150 L481,200 L62,200 L62,190" fill="none" stroke="#6366F1" stroke-width="1.6" stroke-dasharray="5,4" marker-end="url(#arrowp)"/>
  <text x="270" y="194" font-size="12" fill="#6366F1" text-anchor="middle">← 反向：从 loss 沿 grad_fn 链式求导，回传梯度</text>

  <text x="40" y="252" font-size="14" font-weight="600" fill="#111827">机制与优势</text>
  <text x="40" y="278" font-size="12.5" fill="#4B5563">· requires_grad=True → 自动追踪操作，前向边跑边建 DAG</text>
  <text x="40" y="302" font-size="12.5" fill="#4B5563">· 非叶子结果可通过 grad_fn 指向图节点；叶子张量不带这个来源</text>
  <text x="40" y="326" font-size="12.5" fill="#4B5563">· backward 后中间保存量默认释放；引用/retain_graph/create_graph 可延长生命期</text>

  <text x="40" y="404" font-size="12" fill="#9CA3AF">钉子：torch.compile 捕获可编译区域做 kernel 优化，torch.export 产生带约束的可序列化前置图。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
