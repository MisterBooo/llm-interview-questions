<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 500" font-family="-apple-system, system-ui, sans-serif">
  <title>BM25 原理与 TF-IDF 改进点</title>
  <desc>BM25 用 IDF 加权查询词，并以 k1 控制词频饱和、以 b 调节文档长度归一化，避免 TF 线性放大。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366F1"/>
    </marker>
    <marker id="axisArrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="44" font-size="22" font-weight="500" fill="#111827">BM25 vs TF-IDF：词频饱和与长度归一化</text>

  <!-- axes -->
  <line x1="110" y1="400" x2="110" y2="78" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#axisArrow)"/>
  <line x1="110" y1="400" x2="722" y2="400" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#axisArrow)"/>
  <text x="98" y="416" font-size="12" fill="#9CA3AF">0</text>
  <text x="360" y="438" font-size="13" fill="#4B5563">词频 TF（同一词在文档中出现次数）</text>
  <text x="64" y="250" font-size="13" fill="#4B5563" transform="rotate(-90 64 250)">词项得分</text>

  <!-- asymptote -->
  <line x1="110" y1="150" x2="700" y2="150" stroke="#6366F1" stroke-width="1" stroke-dasharray="4 4" opacity="0.55"/>
  <text x="500" y="144" font-size="12" fill="#6366F1">BM25 上限 ≈ (k1+1)·IDF</text>

  <!-- TF-IDF straight line -->
  <line x1="110" y1="400" x2="700" y2="120" stroke="#9CA3AF" stroke-width="2"/>
  <text x="638" y="112" font-size="12" fill="#9CA3AF">基础 TF-IDF</text>

  <!-- BM25 saturating curve -->
  <path d="M110,400 C180,205 280,166 400,158 C520,153 620,151 700,150" fill="none" stroke="#6366F1" stroke-width="2.5"/>
  <text x="664" y="166" font-size="12" fill="#6366F1">BM25</text>

  <!-- saturation annotation -->
  <line x1="430" y1="205" x2="498" y2="158" stroke="#6366F1" stroke-width="1" marker-end="url(#arrowP)"/>
  <text x="300" y="214" font-size="12" fill="#6366F1">词频饱和：词再多，得分趋于上限</text>

  <!-- legend -->
  <rect x="470" y="74" width="280" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <line x1="486" y1="96" x2="516" y2="96" stroke="#9CA3AF" stroke-width="2"/>
  <text x="524" y="100" font-size="12" fill="#4B5563">基础 TF-IDF：未做词频饱和</text>
  <path d="M486,116 C496,108 506,106 516,106" fill="none" stroke="#6366F1" stroke-width="2.5"/>
  <text x="524" y="120" font-size="12" fill="#4B5563">BM25：词频饱和，趋于上限</text>

  <!-- footnote: length normalization -->
  <text x="110" y="470" font-size="12" fill="#9CA3AF">参数 k1 控制饱和快慢；参数 b 做文档长度归一化——长文档里同样的词频会被降权（b 越大惩罚越强）。</text>
  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="490" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
