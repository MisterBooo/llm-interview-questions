<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>VQ-VAE 原理与完整结构</title>
  <desc>VQ-VAE用离散码本量化编码表示，并联合优化重建、码本与承诺损失。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">VQ-VAE：把连续隐空间「量化进一本码本」</text>

  <!-- encoder -->
  <rect x="40" y="120" width="96" height="80" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="88" y="156" font-size="13" fill="#111827" text-anchor="middle">输入</text>
  <text x="88" y="176" font-size="11" fill="#9CA3AF" text-anchor="middle">图像 / patch</text>
  <line x1="136" y1="160" x2="170" y2="160" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="172" y="120" width="96" height="80" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="220" y="156" font-size="13" fill="#111827" text-anchor="middle">编码器</text>
  <text x="220" y="176" font-size="11" fill="#6366F1" text-anchor="middle">→ z_e（连续）</text>

  <!-- VQ layer (core) -->
  <line x1="268" y1="160" x2="302" y2="160" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="304" y="98" width="190" height="160" rx="10" fill="#EEF2FF" stroke="#6366F1" stroke-width="2"/>
  <text x="399" y="122" font-size="13.5" font-weight="600" fill="#111827" text-anchor="middle">向量量化层（核心）</text>
  <text x="399" y="142" font-size="11.5" fill="#6366F1" text-anchor="middle">最近邻查码本 e₁…e_K</text>
  <!-- codebook column -->
  <g text-anchor="middle" font-size="11">
    <rect x="324" y="154" width="150" height="22" rx="4" fill="#FFFFFF" stroke="#E5E7EB"/><text x="399" y="169" fill="#9CA3AF">e₁</text>
    <rect x="324" y="180" width="150" height="22" rx="4" fill="#FFFFFF" stroke="#6366F1"/><text x="399" y="195" fill="#6366F1">e₇  ← 最接近 z_e ✓</text>
    <rect x="324" y="206" width="150" height="22" rx="4" fill="#FFFFFF" stroke="#E5E7EB"/><text x="399" y="221" fill="#9CA3AF">…</text>
    <rect x="324" y="232" width="150" height="20" rx="4" fill="#FFFFFF" stroke="#E5E7EB"/><text x="399" y="246" fill="#9CA3AF">e_K</text>
  </g>

  <!-- decoder -->
  <line x1="494" y1="160" x2="528" y2="160" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="530" y="120" width="110" height="80" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="585" y="150" font-size="13" fill="#111827" text-anchor="middle">解码器</text>
  <text x="585" y="170" font-size="11" fill="#6366F1" text-anchor="middle">用 z_q 量化向量</text>
  <text x="585" y="186" font-size="11" fill="#9CA3AF" text-anchor="middle">重建输入</text>
  <line x1="640" y1="160" x2="674" y2="160" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="676" y="120" width="84" height="80" rx="8" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="718" y="156" font-size="13" fill="#111827" text-anchor="middle">重建</text>
  <text x="718" y="176" font-size="11" fill="#9CA3AF" text-anchor="middle">输出</text>

  <!-- STE -->
  <path d="M530 210 C 460 250 340 250 304 218" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="417" y="262" font-size="11" fill="#9CA3AF" text-anchor="middle">反向：STE 直通，梯度近似复制回编码器</text>

  <!-- losses -->
  <text x="400" y="300" font-size="12.5" fill="#4B5563" text-anchor="middle">损失 = 重建损失　+　VQ 损失（码本→z_e）　+　承诺损失 β（z_e→码本）</text>
  <text x="400" y="322" font-size="11.5" fill="#9CA3AF" text-anchor="middle">离散索引 = 图像版「token」，可直接交给 Transformer 自回归建模</text>

  <text x="40" y="406" font-size="12" fill="#9CA3AF">钉子：码本可用梯度或 EMA 更新；要同时监控活跃码比例、perplexity、量化误差与 dead codes。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
