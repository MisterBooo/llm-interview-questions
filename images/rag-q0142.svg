<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>RAG 错误根源怎么定位?</title>
  <desc>用黄金文档替换、检索消融和证据对齐可隔离变量，结合 Recall、相关性与忠实度定位检索或生成故障。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">RAG 错误归因：检索 vs 生成</text>

  <rect x="320" y="64" width="160" height="44" rx="8" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="400" y="91" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">RAG 输出错误</text>

  <rect x="260" y="134" width="280" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="400" y="160" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">关键实验：用「黄金文档」</text>
  <text x="400" y="178" font-size="12" fill="#4B5563" text-anchor="middle">替换检索结果，重跑生成</text>

  <!-- decision -->
  <polygon points="400,222 474,260 400,298 326,260" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="400" y="264" font-size="12" fill="#111827" text-anchor="middle">黄金证据下稳定答对？</text>

  <!-- branches -->
  <rect x="80" y="338" width="280" height="74" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="220" y="368" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">优先查检索 / 排序 / 组装</text>
  <text x="220" y="388" font-size="12" fill="#4B5563" text-anchor="middle">查 Recall@K · 重排 · chunk 完整性</text>

  <rect x="440" y="338" width="280" height="74" rx="8" fill="#FFF7ED" stroke="#F59E0B"/>
  <text x="580" y="368" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">优先查生成 / Prompt / 解析</text>
  <text x="580" y="388" font-size="12" fill="#4B5563" text-anchor="middle">查证据忠实度 · 随机性 · 输出校验</text>

  <!-- arrows -->
  <line x1="400" y1="108" x2="400" y2="134" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="190" x2="400" y2="222" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <path d="M340,278 C260,310 230,310 220,338" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="250" y="312" font-size="12" fill="#10B981">是</text>
  <path d="M460,278 C540,310 570,310 580,338" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="540" y="312" font-size="12" fill="#EF4444">否</text>

  <!-- coupling -->
  <line x1="360" y1="375" x2="440" y2="375" stroke="#9CA3AF" stroke-width="1" stroke-dasharray="4 4"/>
  <text x="400" y="438" font-size="12" fill="#9CA3AF" text-anchor="middle">钉子：现实中检索与生成常耦合——用黄金文档 + 消融 + 证据对齐拆开看。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
