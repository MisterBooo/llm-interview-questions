<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 360" font-family="-apple-system, system-ui, sans-serif">
  <title>RAG检索质量提升5法</title>
  <desc>RAG 可在检索前做查询改写、多查询和 HyDE 扩展召回，并配合混合检索、重排序、上下文压缩及迭代检索验证整体质量。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">RAG 检索前增强：改写 / 多查询 / HyDE</text>

  <!-- query -->
  <rect x="40" y="148" width="120" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="100" y="180" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">原始 query</text>

  <!-- three methods -->
  <rect x="210" y="74" width="280" height="50" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="226" y="95" font-size="13.5" font-weight="500" fill="#111827">Query 改写</text>
  <text x="226" y="114" font-size="12" fill="#4B5563">澄清 / 纠错 / 补全</text>

  <rect x="210" y="151" width="280" height="50" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="226" y="172" font-size="13.5" font-weight="500" fill="#111827">多查询</text>
  <text x="226" y="191" font-size="12" fill="#4B5563">生成多个变体并行检索</text>

  <rect x="210" y="228" width="280" height="50" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="226" y="249" font-size="13.5" font-weight="500" fill="#111827">HyDE</text>
  <text x="226" y="268" font-size="12" fill="#4B5563">先生成假设答案，再用它检索</text>

  <line x1="160" y1="168" x2="210" y2="100" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="176" x2="210" y2="176" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="160" y1="184" x2="210" y2="253" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- retrieval -->
  <rect x="560" y="148" width="150" height="56" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="635" y="174" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">更全的召回</text>
  <text x="635" y="192" font-size="12" fill="#4B5563" text-anchor="middle">再进检索</text>
  <line x1="490" y1="100" x2="560" y2="170" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="176" x2="560" y2="176" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="490" y1="253" x2="560" y2="182" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- nail -->
  <text x="40" y="324" font-size="12" fill="#9CA3AF">结论：改写可改善模糊查询召回；完整链路还需混合检索、重排、压缩，并用离线/在线指标验证。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="350" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
