<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>DPO vs PPO 怎么选?</title>
  <desc>PPO 依赖在线 rollout、奖励与价值估计闭环，DPO 直接学习离线偏好对，工程链路更短但适用反馈不同。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">DPO vs PPO(RLHF)：要不要显式奖励模型 + RL</text>

  <!-- Row 1: PPO/RLHF -->
  <text x="40" y="86" font-size="13" fill="#6366F1">① PPO / RLHF</text>
  <rect x="40" y="98" width="130" height="60" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="105" y="133" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">SFT 策略 / 参考</text>

  <rect x="210" y="98" width="180" height="60" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="300" y="124" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">奖励模型 RM</text>
  <text x="300" y="143" font-size="12" fill="#4B5563" text-anchor="middle">另用偏好数据训练</text>

  <rect x="430" y="98" width="190" height="60" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="525" y="124" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">PPO 优化</text>
  <text x="525" y="143" font-size="12" fill="#4B5563" text-anchor="middle">RL：policy ↔ RM 打分</text>

  <rect x="660" y="98" width="110" height="60" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="715" y="133" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">对齐模型</text>

  <path d="M170,128 C190,78 400,78 444,104" fill="none" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="390" y1="128" x2="430" y2="128" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="620" y1="128" x2="660" y2="128" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="405" y="186" font-size="12" fill="#EF4444">rollout + RM/critic + KL 控制 → 工程复杂</text>

  <!-- divider -->
  <line x1="40" y1="212" x2="760" y2="212" stroke="#E5E7EB" stroke-dasharray="3 3"/>

  <!-- Row 2: DPO -->
  <text x="40" y="250" font-size="13" fill="#6366F1">② DPO</text>
  <rect x="40" y="262" width="130" height="60" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="105" y="297" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">SFT 模型</text>

  <rect x="230" y="262" width="330" height="60" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="395" y="288" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">直接偏好优化 DPO</text>
  <text x="395" y="307" font-size="12" fill="#4B5563" text-anchor="middle">chosen ≻ rejected，分类式 loss</text>

  <rect x="660" y="262" width="110" height="60" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="715" y="297" font-size="13.5" font-weight="500" fill="#111827" text-anchor="middle">对齐模型</text>

  <line x1="170" y1="292" x2="230" y2="292" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="560" y1="292" x2="660" y2="292" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="230" y="350" font-size="12" fill="#10B981">无需单独 RM 与在线 rollout → 链路较短</text>

  <!-- nail -->
  <text x="40" y="408" font-size="12" fill="#9CA3AF">钉子：DPO 适合固定偏好对；PPO 适合可靠标量奖励与在线采样，选型取决于反馈闭环。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
