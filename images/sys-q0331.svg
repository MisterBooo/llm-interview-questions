<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 400" font-family="-apple-system, system-ui, sans-serif">
  <title>FAISS 怎么实现高效 ANN 搜索?</title>
  <desc>FAISS 通过 IVF 只探测部分聚类桶，并用 PQ 压缩向量和查表估距，以牺牲可控召回率换取大规模近似近邻的速度与内存收益。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">FAISS / ANN 索引：用近似换速度与内存</text>

  <rect x="40" y="80" width="720" height="64" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="58" y="108" font-size="15" font-weight="500" fill="#111827">Flat 暴力（精确）</text>
  <text x="58" y="130" font-size="12.5" fill="#4B5563">与全部向量逐一比对 → 结果精确，但慢、占内存。</text>

  <rect x="40" y="160" width="720" height="64" rx="10" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="58" y="188" font-size="15" font-weight="500" fill="#111827">IVF 倒排（减比对）</text>
  <text x="58" y="210" font-size="12.5" fill="#4B5563">先聚类成 nlist 个桶；query 只搜最近的几个桶 → 大幅减少比对次数。</text>

  <rect x="40" y="240" width="720" height="64" rx="10" fill="#ECFDF5" stroke="#10B981"/>
  <text x="58" y="268" font-size="15" font-weight="500" fill="#111827">PQ 乘积量化（压内存）</text>
  <text x="58" y="290" font-size="12.5" fill="#4B5563">向量切成子段 + 码本量化存储 → 大幅压缩内存占用。</text>

  <!-- nail -->
  <text x="40" y="346" font-size="12" fill="#9CA3AF">钉子：FAISS 用 IVF（减比对）+ PQ（压内存）把精确最近邻换成近似最近邻 ANN——牺牲少量召回换大幅提速省内存。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="390" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
