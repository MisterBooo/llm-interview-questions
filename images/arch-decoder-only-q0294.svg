<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>Decoder-only 架构为何是主流?</title>
  <desc>Decoder-only 以统一因果语言建模覆盖多种生成任务，训练可并行、解码可复用 KV Cache，工程扩展简单，但不在所有任务上优于其他架构。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">三种架构：为何主流大模型选了 Decoder-only</text>

  <!-- Encoder-only -->
  <rect x="40" y="64" width="226" height="290" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="153" y="90" font-size="15" font-weight="500" fill="#111827" text-anchor="middle">Encoder-only</text>
  <text x="153" y="110" font-size="12" fill="#9CA3AF" text-anchor="middle">BERT</text>
  <!-- bidirectional mask 3x3 full -->
  <g>
    <rect x="103" y="126" width="100" height="100" rx="4" fill="#F9FAFB" stroke="#E5E7EB"/>
    <g fill="#9CA3AF">
      <rect x="106" y="129" width="30" height="30"/><rect x="139" y="129" width="30" height="30"/><rect x="172" y="129" width="30" height="30"/>
      <rect x="106" y="162" width="30" height="30"/><rect x="139" y="162" width="30" height="30"/><rect x="172" y="162" width="30" height="30"/>
      <rect x="106" y="195" width="30" height="30"/><rect x="139" y="195" width="30" height="30"/><rect x="172" y="195" width="30" height="30"/>
    </g>
    <text x="153" y="244" font-size="11" fill="#9CA3AF" text-anchor="middle">全可见（双向）</text>
  </g>
  <text x="153" y="276" font-size="12.5" fill="#111827" text-anchor="middle">擅长理解 / 分类</text>
  <text x="153" y="298" font-size="12" fill="#EF4444" text-anchor="middle">不能自然生成</text>
  <text x="153" y="328" font-size="11.5" fill="#9CA3AF" text-anchor="middle">MLM 预训练，目标与</text>
  <text x="153" y="344" font-size="11.5" fill="#9CA3AF" text-anchor="middle">下游不一致</text>

  <!-- Encoder-Decoder -->
  <rect x="287" y="64" width="226" height="290" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="400" y="90" font-size="15" font-weight="500" fill="#111827" text-anchor="middle">Encoder-Decoder</text>
  <text x="400" y="110" font-size="12" fill="#9CA3AF" text-anchor="middle">T5 / BART</text>
  <rect x="312" y="126" width="80" height="100" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="352" y="180" font-size="12" fill="#111827" text-anchor="middle">Encoder</text>
  <rect x="408" y="126" width="80" height="100" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/>
  <text x="448" y="180" font-size="12" fill="#111827" text-anchor="middle">Decoder</text>
  <line x1="392" y1="176" x2="408" y2="176" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="400" y="244" font-size="11" fill="#9CA3AF" text-anchor="middle">交叉注意力桥接</text>
  <text x="400" y="276" font-size="12.5" fill="#111827" text-anchor="middle">擅长 seq2seq / 翻译</text>
  <text x="400" y="298" font-size="12" fill="#EF4444" text-anchor="middle">两套结构，更重</text>
  <text x="400" y="328" font-size="11.5" fill="#9CA3AF" text-anchor="middle">输入输出格式需区分，</text>
  <text x="400" y="344" font-size="11.5" fill="#9CA3AF" text-anchor="middle">数据准备复杂</text>

  <!-- Decoder-only (highlight) -->
  <rect x="534" y="64" width="226" height="290" rx="10" fill="#F5F6FF" stroke="#6366F1" stroke-width="2"/>
  <text x="647" y="90" font-size="15" font-weight="600" fill="#111827" text-anchor="middle">Decoder-only ✓</text>
  <text x="647" y="110" font-size="12" fill="#6366F1" text-anchor="middle">GPT / LLaMA</text>
  <!-- causal lower-triangular mask -->
  <rect x="597" y="126" width="100" height="100" rx="4" fill="#FFFFFF" stroke="#6366F1"/>
  <g fill="#6366F1">
    <rect x="600" y="129" width="30" height="30"/>
    <rect x="600" y="162" width="30" height="30"/><rect x="633" y="162" width="30" height="30"/>
    <rect x="600" y="195" width="30" height="30"/><rect x="633" y="195" width="30" height="30"/><rect x="666" y="195" width="30" height="30"/>
  </g>
  <text x="647" y="244" font-size="11" fill="#6366F1" text-anchor="middle">因果掩码（下三角）</text>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>
  <text x="647" y="276" font-size="12.5" font-weight="500" fill="#111827" text-anchor="middle">所有任务 → 续写生成</text>
  <text x="647" y="298" font-size="12" fill="#6366F1" text-anchor="middle">预训练=微调目标一致</text>
  <text x="647" y="328" font-size="11.5" fill="#4B5563" text-anchor="middle">训练硬件友好 + KV-Cache</text>
  <text x="647" y="344" font-size="11.5" fill="#4B5563" text-anchor="middle">复用 + 规模化同质</text>

  <text x="40" y="406" font-size="12" fill="#9CA3AF">钉子：因果掩码牺牲了双向上下文，未来或有融合双向/单向的架构、专用硬件打破当前格局——不是绝对更好，是更合当下路径。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
