<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 600" font-family="-apple-system, system-ui, sans-serif">
  <title>ReAct 架构原理与失败场景</title>
  <desc>ReAct 将当前规划、工具行动和环境观察交替循环，使后续决策利用真实反馈，并在满足停止条件后输出答案。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrowI" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366F1"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">ReAct 架构：边想边做的循环</text>

  <rect x="150" y="70" width="220" height="46" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="260" y="98" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">用户问题</text>

  <rect x="150" y="140" width="220" height="56" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="260" y="166" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">Plan / Decision</text>
  <text x="260" y="184" font-size="12" fill="#4B5563" text-anchor="middle">产出下一步结构化决策</text>

  <rect x="150" y="226" width="220" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="260" y="252" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">Action 行动</text>
  <text x="260" y="270" font-size="12" fill="#4B5563" text-anchor="middle">执行一次工具调用</text>

  <rect x="150" y="312" width="220" height="56" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="260" y="338" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">Observation 观察</text>
  <text x="260" y="356" font-size="12" fill="#4B5563" text-anchor="middle">工具返回结果</text>

  <!-- decision diamond -->
  <polygon points="260,396 340,432 260,468 180,432" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="260" y="436" font-size="12" fill="#111827" text-anchor="middle">信息是否足够？</text>

  <rect x="150" y="500" width="220" height="46" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="260" y="528" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">生成最终回答</text>

  <!-- forward arrows -->
  <line x1="260" y1="116" x2="260" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="196" x2="260" y2="226" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="282" x2="260" y2="312" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="368" x2="260" y2="396" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="468" x2="260" y2="500" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="272" y="490" font-size="12" fill="#10B981">是</text>

  <!-- loop back: diamond -> plan -->
  <path d="M180,432 C80,432 80,168 150,168" fill="none" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowI)"/>
  <text x="30" y="304" font-size="12" fill="#6366F1">否，继续循环</text>

  <!-- nail -->
  <text x="40" y="572" font-size="12" fill="#9CA3AF">钉子：生产难点是停止条件与循环控制（防死循环 / 防过早收敛）。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="508" y="590" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
