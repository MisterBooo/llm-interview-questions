<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>均匀采样vs关键帧如何影响模型？</title>
  <desc>视频采帧应在视觉token预算内按任务选择均匀、随机、场景或事件驱动策略并保留关键时序证据。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">视频切帧：用有限帧数，尽量少损地传信息</text>

  <text x="40" y="70" font-size="13" fill="#4B5563">本质是在视觉 token/计算预算内保留任务证据；帧数、分辨率、时间位置要联合选。</text>

  <rect x="40" y="88" width="232" height="218" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="56" y="116" font-size="15" font-weight="600" fill="#111827">均匀采样</text>
  <text x="56" y="142" font-size="12.5" fill="#4B5563">每隔固定间隔抽一帧</text>
  <line x1="56" y1="160" x2="256" y2="160" stroke="#E5E7EB"/>
  <text x="56" y="184" font-size="12.5" fill="#10B981">✓ 视频分类 / 检索</text>
  <text x="56" y="206" font-size="12.5" fill="#4B5563">（强调全局时间覆盖）</text>
  <text x="56" y="232" font-size="12.5" fill="#DC6803">✗ 易切掉关键动作时序</text>

  <rect x="288" y="88" width="232" height="218" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="304" y="116" font-size="15" font-weight="600" fill="#111827">稠密采样</text>
  <text x="304" y="142" font-size="12.5" fill="#4B5563">短间隔连续采样</text>
  <line x1="304" y1="160" x2="504" y2="160" stroke="#E5E7EB"/>
  <text x="304" y="184" font-size="12.5" fill="#10B981">✓ 动作识别 / 时序定位</text>
  <text x="304" y="206" font-size="12.5" fill="#4B5563">（保留动作边界）</text>
  <text x="304" y="232" font-size="12.5" fill="#DC6803">✗ token 爆炸、显存吃紧</text>

  <rect x="536" y="88" width="224" height="218" rx="10" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="552" y="116" font-size="15" font-weight="600" fill="#6366F1">关键帧采样</text>
  <text x="552" y="142" font-size="12.5" fill="#4B5563">在场景 / 镜头变化处抽帧</text>
  <line x1="552" y1="160" x2="744" y2="160" stroke="#DDE0FF"/>
  <text x="552" y="184" font-size="12.5" fill="#10B981">✓ 信息密度高、省 token</text>
  <text x="552" y="206" font-size="12.5" fill="#4B5563">（去冗余）</text>
  <text x="552" y="232" font-size="12.5" fill="#DC6803">✗ 依赖变化检测</text>

  <text x="40" y="346" font-size="13" fill="#4B5563">可比较<tspan fill="#6366F1" font-weight="500">混合策略</tspan>：低成本全局扫描后，按问题/场景/运动候选加密；收益需与单阶段基线比。</text>

  <text x="40" y="404" font-size="12" fill="#9CA3AF">钉子：自适应采样虽好，但工程落地难——实时计算帧重要性会引入额外延迟。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
