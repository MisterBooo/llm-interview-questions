<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>NDCG 怎么计算?</title>
  <desc>NDCG用位置折扣累积相关性增益并除以理想排序的DCG，从而在同一查询内归一化排序质量。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">NDCG：相关的排越前，得分越高（位置打折）</text>

  <!-- actual ranking -->
  <rect x="40" y="68" width="430" height="232" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="58" y="92" font-size="14" font-weight="500" fill="#111827">实际排序的 DCG</text>
  <text x="58" y="112" font-size="11.5" fill="#9CA3AF">DCG = Σ (2^rel_i−1) / log₂(i+1)，高相关项与头部位置权重更大</text>
  <!-- header -->
  <g font-size="11.5" fill="#9CA3AF">
    <text x="76" y="138">位置 i</text><text x="176" y="138">相关性 rel</text><text x="300" y="138">折扣 1/log₂(i+1)</text><text x="430" y="138" text-anchor="end">贡献</text>
  </g>
  <g font-size="12" fill="#111827">
    <line x1="58" y1="146" x2="452" y2="146" stroke="#E5E7EB"/>
    <text x="76" y="166">1</text><text x="176" y="166">3</text><text x="300" y="166">1.00</text><text x="452" y="166" text-anchor="end" fill="#6366F1">7.00</text>
    <text x="76" y="190">2</text><text x="176" y="190">2</text><text x="300" y="190">0.63</text><text x="452" y="190" text-anchor="end">1.89</text>
    <text x="76" y="214">3</text><text x="176" y="214">3</text><text x="300" y="214">0.50</text><text x="452" y="214" text-anchor="end">3.50</text>
    <text x="76" y="238">4</text><text x="176" y="238">0</text><text x="300" y="238">0.43</text><text x="452" y="238" text-anchor="end">0.00</text>
    <text x="76" y="262">5</text><text x="176" y="262">1</text><text x="300" y="262">0.39</text><text x="452" y="262" text-anchor="end">0.39</text>
    <line x1="58" y1="272" x2="452" y2="272" stroke="#E5E7EB"/>
  </g>
  <text x="58" y="292" font-size="13" font-weight="500" fill="#111827">DCG = 12.78</text>

  <!-- ideal + ndcg -->
  <rect x="490" y="68" width="270" height="232" rx="10" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="508" y="92" font-size="14" font-weight="500" fill="#111827">理想排序的 IDCG</text>
  <text x="508" y="116" font-size="12" fill="#111827">按相关性从高到低重排：</text>
  <text x="508" y="138" font-size="12.5" fill="#6366F1">3 · 3 · 2 · 1 · 0</text>
  <text x="508" y="166" font-size="13" font-weight="500" fill="#111827">IDCG = 13.35</text>
  <line x1="508" y1="184" x2="742" y2="184" stroke="#E5E7EB"/>
  <rect x="508" y="200" width="234" height="56" rx="8" fill="#EEF2FF" stroke="#6366F1"/>
  <text x="625" y="224" font-size="13.5" font-weight="600" fill="#111827" text-anchor="middle">NDCG = DCG / IDCG</text>
  <text x="625" y="246" font-size="13" fill="#6366F1" text-anchor="middle">= 12.78 / 13.35 ≈ 0.958</text>
  <text x="625" y="282" font-size="11.5" fill="#9CA3AF" text-anchor="middle">归一到 0~1；比较时要统一标注尺度与 k</text>

  <text x="40" y="338" font-size="12.5" fill="#4B5563">看的是「排得对不对」，不是命中率；头部位置的相关性权重最大。</text>

  <text x="40" y="406" font-size="12" fill="#9CA3AF">钉子：若 IDCG@k=0，要在指标规范中明确该查询跳过还是记 0，并同时报告 Recall/MRR 等指标。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
