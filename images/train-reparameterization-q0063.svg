<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>重参数化技巧怎么解决梯度问题?</title>
  <desc>重参数化把随机变量写成参数与独立噪声的可微函数，使路径梯度能够通过采样计算。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
    <marker id="arrowR" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#EF4444"/>
    </marker>
    <marker id="arrowP" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6366F1"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">重参数化：把随机性挪出去，让采样可导</text>

  <!-- direct sampling -->
  <rect x="40" y="72" width="350" height="248" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="58" y="98" font-size="15" font-weight="500" fill="#111827">直接采样</text>
  <rect x="70" y="120" width="120" height="40" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/><text x="130" y="145" font-size="13" fill="#111827" text-anchor="middle">μ, σ（参数）</text>
  <line x1="190" y1="140" x2="224" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="226" y="116" width="130" height="48" rx="6" fill="#FEF2F2" stroke="#EF4444"/><text x="291" y="138" font-size="13" fill="#111827" text-anchor="middle">采样节点</text><text x="291" y="156" font-size="11" fill="#EF4444" text-anchor="middle">z ~ N(μ, σ²)</text>
  <!-- broken gradient back -->
  <line x1="226" y1="195" x2="132" y2="172" stroke="#EF4444" stroke-width="1.5" stroke-dasharray="4 4" marker-end="url(#arrowR)"/>
  <text x="220" y="214" font-size="12.5" fill="#EF4444">✗ 梯度在采样处断开</text>
  <rect x="70" y="232" width="286" height="68" rx="8" fill="#FEF2F2" stroke="#EF4444"/>
  <text x="213" y="258" font-size="12.5" fill="#111827" text-anchor="middle">普通反传不能直接穿过采样节点</text>
  <text x="213" y="282" font-size="11.5" fill="#9CA3AF" text-anchor="middle">可用 score-function，但通常方差更高</text>

  <!-- reparameterized -->
  <rect x="410" y="72" width="350" height="248" rx="10" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="428" y="98" font-size="15" font-weight="600" fill="#111827">重参数化 ✓</text>
  <rect x="428" y="118" width="150" height="34" rx="6" fill="#FFFFFF" stroke="#6366F1"/><text x="503" y="140" font-size="12.5" fill="#111827" text-anchor="middle">μ, σ（确定性）</text>
  <rect x="428" y="160" width="150" height="34" rx="6" fill="#F3F4F6" stroke="#9CA3AF"/><text x="503" y="182" font-size="12" fill="#9CA3AF" text-anchor="middle">ε ~ N(0, I) 外部噪声</text>
  <line x1="578" y1="135" x2="612" y2="160" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="578" y1="177" x2="612" y2="172" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="614" y="138" width="132" height="48" rx="6" fill="#EEF2FF" stroke="#6366F1"/><text x="680" y="160" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">z = μ + σ·ε</text><text x="680" y="178" font-size="10.5" fill="#6366F1" text-anchor="middle">随机性全在 ε</text>
  <line x1="614" y1="200" x2="510" y2="156" stroke="#6366F1" stroke-width="1.5" marker-end="url(#arrowP)"/>
  <text x="588" y="216" font-size="12.5" fill="#6366F1">✓ 梯度从 z 直通 μ, σ</text>
  <rect x="428" y="232" width="318" height="68" rx="8" fill="#FFFFFF" stroke="#6366F1"/>
  <text x="587" y="258" font-size="12.5" fill="#111827" text-anchor="middle">∂z/∂μ = 1，∂z/∂σ = ε，路径清晰</text>
  <text x="587" y="282" font-size="11.5" fill="#6366F1" text-anchor="middle">VAE 的 ELBO 可端到端训练，方差也更小</text>

  <text x="40" y="406" font-size="12" fill="#9CA3AF">钉子：VAE 用它获得低方差路径梯度；DDPM 用闭式噪声构造，求导对象与作用边界不同。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
