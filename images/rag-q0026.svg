<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>Agent 长短期记忆如何分层?</title>
  <desc>Agent记忆按工作、会话与长期职责管理，通过可追溯写入、受权检索、版本冲突和删除机制保证可靠。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">Agent 记忆系统：信息生命周期管理（三层）</text>

  <rect x="40" y="88" width="390" height="66" rx="10" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="56" y="114" font-size="14" font-weight="600" fill="#6366F1">短期记忆（工作记忆）</text>
  <text x="56" y="138" font-size="12.5" fill="#4B5563">对接 LLM 上下文窗口；滑动窗口 + token 预算截断</text>

  <rect x="40" y="164" width="390" height="66" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="56" y="190" font-size="14" font-weight="600" fill="#111827">中期记忆（情景记忆）</text>
  <text x="56" y="214" font-size="12.5" fill="#4B5563">追踪当前会话内的实体与关系</text>

  <rect x="40" y="240" width="390" height="66" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="56" y="266" font-size="14" font-weight="600" fill="#111827">长期记忆（语义 / 持久）</text>
  <text x="56" y="290" font-size="12.5" fill="#4B5563">向量库存储，跨会话沉淀与召回</text>

  <text x="40" y="284" font-size="0" fill="none"> </text>

  <rect x="450" y="88" width="310" height="100" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="466" y="114" font-size="14" font-weight="600" fill="#111827">检索机制</text>
  <text x="466" y="140" font-size="12.5" fill="#4B5563">混合检索（语义 + 关键词）+ 重排，</text>
  <text x="466" y="162" font-size="12.5" fill="#4B5563">按需召回最相关的历史记忆注入上下文</text>

  <rect x="450" y="200" width="310" height="106" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="466" y="226" font-size="14" font-weight="600" fill="#111827">压缩与遗忘</text>
  <text x="466" y="252" font-size="12.5" fill="#4B5563">旧信息摘要压缩 + TTL 过期淘汰，</text>
  <text x="466" y="274" font-size="12.5" fill="#4B5563">防止记忆无限膨胀、注意力稀释</text>
  <text x="466" y="296" font-size="12" fill="#6B7280">三层职责按场景选，非固定模板</text>

  <text x="40" y="356" font-size="13" fill="#4B5563">设计核心：让 agent 记住该记的、忘掉该忘的，并能在需要时快速想起来。</text>

  <text x="40" y="404" font-size="12" fill="#9CA3AF">钉子：写入前要做权限、来源、重复、冲突和时效检查；检索后仍要重排并防止敏感记忆跨用户泄露。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
