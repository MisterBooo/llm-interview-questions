<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 560" font-family="-apple-system, system-ui, sans-serif">
  <title>怎么让模型稳定输出 JSON?</title>
  <desc>稳定结构化输出应优先使用严格 Schema 或工具协议，再做解析校验、错误回灌、有限重试与失败降级。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="20" font-weight="500" fill="#111827">稳定 JSON 输出：预防 + 校验 + 重试</text>

  <rect x="150" y="70" width="220" height="46" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="260" y="98" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">请求结构化输出</text>

  <rect x="150" y="140" width="220" height="56" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="260" y="166" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">预防层</text>
  <text x="260" y="184" font-size="12" fill="#4B5563" text-anchor="middle">Function Calling · JSON Schema 约束</text>

  <rect x="150" y="226" width="220" height="46" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="260" y="254" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">模型输出</text>

  <!-- decision -->
  <polygon points="260,302 330,338 260,374 190,338" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="260" y="342" font-size="12" fill="#111827" text-anchor="middle">Schema 校验</text>

  <!-- fault-tolerance branch (right) -->
  <rect x="386" y="300" width="124" height="56" rx="8" fill="#FFF7ED" stroke="#F59E0B"/>
  <text x="448" y="326" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">容错层</text>
  <text x="448" y="344" font-size="12" fill="#4B5563" text-anchor="middle">回灌错误·重试</text>

  <rect x="150" y="430" width="220" height="46" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="260" y="458" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">返回结构化结果</text>

  <!-- arrows -->
  <line x1="260" y1="116" x2="260" y2="140" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="196" x2="260" y2="226" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="272" x2="260" y2="302" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="260" y1="374" x2="260" y2="430" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="272" y="412" font-size="12" fill="#10B981">通过</text>

  <!-- fail -> fault box -->
  <line x1="330" y1="338" x2="386" y2="328" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <text x="338" y="318" font-size="12" fill="#F59E0B">失败</text>

  <!-- fault box -> back to model output -->
  <path d="M448,300 C448,238 448,238 372,243" fill="none" stroke="#9CA3AF" stroke-width="1.5" stroke-dasharray="5 4" marker-end="url(#arrow)"/>
  <text x="392" y="232" font-size="12" fill="#4B5563">重试</text>

  <!-- nail -->
  <text x="40" y="520" font-size="12" fill="#9CA3AF">钉子：可靠性来自协议 + 校验 + 重试闭环，不是单靠 prompt。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="508" y="550" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
