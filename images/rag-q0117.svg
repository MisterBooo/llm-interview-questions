<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 430" font-family="-apple-system, system-ui, sans-serif">
  <title>Reranker 训练数据怎么构造?</title>
  <desc>Reranker 数据应包含真实相关正样本、线上召回分布中的难负样本和适量易负样本，并持续质检回流。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">Reranker 训练数据：难负样本要复核</text>

  <!-- query -->
  <rect x="40" y="150" width="120" height="50" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="100" y="180" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">用户 query</text>

  <!-- candidate pool -->
  <rect x="200" y="138" width="180" height="74" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="290" y="170" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">召回候选池</text>
  <text x="290" y="190" font-size="12" fill="#4B5563" text-anchor="middle">（来自线上召回器）</text>
  <line x1="160" y1="175" x2="200" y2="175" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- three sample types -->
  <rect x="440" y="96" width="300" height="44" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="456" y="123" font-size="13" fill="#111827">正样本（相关文档）</text>

  <rect x="440" y="152" width="300" height="44" rx="8" fill="#FFF7ED" stroke="#F59E0B"/>
  <text x="456" y="179" font-size="13" font-weight="500" fill="#111827">★ 难负样本（相似但不相关）</text>

  <rect x="440" y="208" width="300" height="44" rx="8" fill="#F3F4F6" stroke="#E5E7EB"/>
  <text x="456" y="235" font-size="13" fill="#9CA3AF">易负样本（明显不相关）</text>

  <line x1="380" y1="170" x2="440" y2="118" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="175" x2="440" y2="174" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="380" y1="180" x2="440" y2="230" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- train -->
  <rect x="440" y="300" width="300" height="50" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="590" y="330" font-size="14" font-weight="500" fill="#111827" text-anchor="middle">标注 → 训练 Reranker</text>
  <line x1="590" y1="252" x2="590" y2="300" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="40" y="300" font-size="12" fill="#F59E0B">★ 难负样本通常信息量高：</text>
  <text x="40" y="320" font-size="12" fill="#4B5563">先排除假阴性，再调采样比例。</text>

  <!-- nail -->
  <text x="40" y="392" font-size="12" fill="#9CA3AF">钉子：训练集候选必须贴近线上召回器的分布，否则会有训练-推理鸿沟。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="420" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
