<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>DeepSpeed 核心特性与架构怎么用?</title>
  <desc>DeepSpeed通过ZeRO、混合精度、检查点和多维并行扩展训练，收益取决于模型、集群和通信瓶颈。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">DeepSpeed ZeRO：把每卡冗余的状态逐级分片</text>

  <!-- ZeRO-1 -->
  <rect x="40" y="70" width="230" height="200" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="155" y="96" font-size="15" font-weight="500" fill="#111827" text-anchor="middle">ZeRO-1</text>
  <rect x="62" y="110" width="186" height="34" rx="6" fill="#F5F6FF" stroke="#6366F1"/><text x="155" y="132" font-size="12.5" fill="#111827" text-anchor="middle">优化器状态：分片 ✓</text>
  <rect x="62" y="150" width="186" height="34" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/><text x="155" y="172" font-size="12.5" fill="#9CA3AF" text-anchor="middle">梯度：全量</text>
  <rect x="62" y="190" width="186" height="34" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/><text x="155" y="212" font-size="12.5" fill="#9CA3AF" text-anchor="middle">参数：全量</text>
  <text x="155" y="250" font-size="11.5" fill="#9CA3AF" text-anchor="middle">8 卡时该组成部分接近 1/8</text>

  <!-- ZeRO-2 -->
  <rect x="285" y="70" width="230" height="200" rx="10" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="400" y="96" font-size="15" font-weight="500" fill="#111827" text-anchor="middle">ZeRO-2</text>
  <rect x="307" y="110" width="186" height="34" rx="6" fill="#F5F6FF" stroke="#6366F1"/><text x="400" y="132" font-size="12.5" fill="#111827" text-anchor="middle">优化器状态：分片 ✓</text>
  <rect x="307" y="150" width="186" height="34" rx="6" fill="#F5F6FF" stroke="#6366F1"/><text x="400" y="172" font-size="12.5" fill="#111827" text-anchor="middle">梯度：分片 ✓</text>
  <rect x="307" y="190" width="186" height="34" rx="6" fill="#F9FAFB" stroke="#E5E7EB"/><text x="400" y="212" font-size="12.5" fill="#9CA3AF" text-anchor="middle">参数：全量</text>
  <text x="400" y="250" font-size="11.5" fill="#6366F1" text-anchor="middle">收益与通信看 world size 和拓扑</text>

  <!-- ZeRO-3 -->
  <rect x="530" y="70" width="230" height="200" rx="10" fill="#F5F6FF" stroke="#6366F1" stroke-width="2"/>
  <text x="645" y="96" font-size="15" font-weight="600" fill="#111827" text-anchor="middle">ZeRO-3</text>
  <rect x="552" y="110" width="186" height="34" rx="6" fill="#EEF2FF" stroke="#6366F1"/><text x="645" y="132" font-size="12.5" fill="#111827" text-anchor="middle">优化器状态：分片 ✓</text>
  <rect x="552" y="150" width="186" height="34" rx="6" fill="#EEF2FF" stroke="#6366F1"/><text x="645" y="172" font-size="12.5" fill="#111827" text-anchor="middle">梯度：分片 ✓</text>
  <rect x="552" y="190" width="186" height="34" rx="6" fill="#EEF2FF" stroke="#6366F1"/><text x="645" y="212" font-size="12.5" fill="#111827" text-anchor="middle">参数：分片 ✓</text>
  <text x="645" y="250" font-size="11.5" fill="#EF4444" text-anchor="middle">计算前按需 all-gather，峰值与通信要实测</text>

  <!-- gradient: memory down, comm up -->
  <text x="40" y="296" font-size="12" fill="#6366F1">← 分片的状态种类增多</text>
  <text x="760" y="296" font-size="12" fill="#EF4444" text-anchor="end">显存、通信与吞吐共同取舍 →</text>

  <text x="400" y="328" font-size="12.5" fill="#4B5563" text-anchor="middle">ZeRO 的数据并行分片可与 tensor / pipeline parallel 按集群组合</text>

  <text x="40" y="406" font-size="12" fill="#9CA3AF">钉子：ZeRO-3 不保证总是最快；互连与 offload 带宽会影响扩展效率，需报告拓扑和通信占比。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
