<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>多路召回 vs 排序模型怎么分工?</title>
  <desc>多路召回扩大候选覆盖，排序统一估计业务目标，两层都需处理去重、校准、日志偏差和分桶评估。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9CA3AF"/>
    </marker>
  </defs>

  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">多路召回 + 排序：各路并行海选，再统一精打分</text>

  <!-- 三路召回 -->
  <rect x="40" y="84" width="210" height="46" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="54" y="104" font-size="13" font-weight="500" fill="#111827">协同过滤</text>
  <text x="54" y="122" font-size="11.5" fill="#4B5563">行为矩阵，适合老用户</text>
  <rect x="40" y="142" width="210" height="46" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="54" y="162" font-size="13" font-weight="500" fill="#111827">向量召回（双塔）</text>
  <text x="54" y="180" font-size="11.5" fill="#4B5563">语义匹配；有内容特征时可缓解冷启动</text>
  <rect x="40" y="200" width="210" height="46" rx="8" fill="#FFFFFF" stroke="#E5E7EB"/>
  <text x="54" y="220" font-size="13" font-weight="500" fill="#111827">热门 / 规则兜底</text>
  <text x="54" y="238" font-size="11.5" fill="#4B5563">新用户无信息时保底</text>

  <rect x="300" y="120" width="100" height="90" rx="8" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="350" y="160" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">合并</text>
  <text x="350" y="180" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">去重</text>

  <rect x="450" y="135" width="130" height="60" rx="8" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="515" y="160" font-size="13.5" font-weight="600" fill="#6366F1" text-anchor="middle">排序模型</text>
  <text x="515" y="180" font-size="11.5" fill="#4B5563" text-anchor="middle">LR → 多目标</text>

  <rect x="628" y="143" width="120" height="44" rx="8" fill="#ECFDF5" stroke="#10B981"/>
  <text x="688" y="170" font-size="13" font-weight="500" fill="#111827" text-anchor="middle">Top 结果</text>

  <line x1="250" y1="107" x2="300" y2="150" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="165" x2="300" y2="165" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="250" y1="223" x2="300" y2="180" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="400" y1="165" x2="450" y2="165" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>
  <line x1="580" y1="165" x2="628" y2="165" stroke="#9CA3AF" stroke-width="1.5" marker-end="url(#arrow)"/>

  <text x="40" y="290" font-size="13" font-weight="600" fill="#111827">关键点</text>
  <text x="40" y="314" font-size="12.5" fill="#4B5563">· 召回求覆盖率（快而全），排序求精度（精而准）——漏斗的两端</text>
  <text x="40" y="338" font-size="12.5" fill="#4B5563">· 各路可互补也会重复；是否多路及如何融合要由覆盖、延迟与业务目标决定</text>

  <text x="40" y="404" font-size="12" fill="#9CA3AF">钉子：排序还要处理 position/selection bias，多样性可在模型目标、约束或重排中实现，应做消融实验。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
