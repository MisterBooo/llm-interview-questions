<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 800 460" font-family="-apple-system, system-ui, sans-serif">
  <title>BM25公式参数含义与TF-IDF对比</title>
  <desc>BM25结合IDF、词频饱和与长度归一化，公式实现和参数需按检索引擎与目标查询集验证。</desc>
  <rect data-publish-background="true" width="100%" height="100%" fill="#FFFFFF"/>
  <text x="40" y="40" font-size="21" font-weight="500" fill="#111827">BM25：带词频饱和与长度归一化的相关性打分</text>

  <!-- 公式 -->
  <rect x="40" y="66" width="720" height="68" rx="10" fill="#F5F6FF" stroke="#6366F1"/>
  <text x="400" y="100" font-size="16" font-weight="500" fill="#111827" text-anchor="middle">score(D,Q) = Σ IDF(qᵢ) · [ f·(k₁+1) ] / [ f + k₁·(1 − b + b·|D|/avgdl) ]</text>
  <text x="400" y="122" font-size="11.5" fill="#6B7280" text-anchor="middle">f = 词 qᵢ 在文档 D 中的词频</text>

  <!-- 参数注解 -->
  <text x="40" y="172" font-size="13" font-weight="600" fill="#111827">参数含义</text>
  <text x="40" y="196" font-size="12.5" fill="#4B5563">· IDF(qᵢ)：由总文档数 N 与包含该词的文档数 n 计算；具体平滑看实现</text>
  <text x="40" y="220" font-size="12.5" fill="#4B5563">· k₁：控制词频何时饱和（典型 1.2 ~ 2.0）</text>
  <text x="40" y="244" font-size="12.5" fill="#4B5563">· b：长度归一化强度（典型 0.75）；|D|/avgdl：文档长度 / 平均长度</text>

  <!-- 相比 TF-IDF 的两点改进 -->
  <rect x="40" y="268" width="350" height="74" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="56" y="292" font-size="13" font-weight="600" fill="#111827">① 词频饱和</text>
  <text x="56" y="314" font-size="12" fill="#4B5563">TF-IDF 词频线性增长；BM25 饱和，</text>
  <text x="56" y="332" font-size="12" fill="#4B5563">词出现越多边际收益递减</text>

  <rect x="410" y="268" width="350" height="74" rx="10" fill="#FFFFFF" stroke="#9CA3AF"/>
  <text x="426" y="292" font-size="13" font-weight="600" fill="#111827">② 长度归一化</text>
  <text x="426" y="314" font-size="12" fill="#4B5563">用 |D|/avgdl 调整词频贡献，</text>
  <text x="426" y="332" font-size="12" fill="#4B5563">降低长文档因容量更大带来的优势</text>

  <text x="40" y="404" font-size="12" fill="#9CA3AF">钉子：IDF 依赖语料统计，动态知识库要确认搜索引擎如何更新 doc frequency 与分片统计。</text>

  <g opacity="0.28" font-family="-apple-system, system-ui, sans-serif" fill="#9CA3AF">
    <text x="12" y="18" font-size="11">www.wushixiongai.com</text>
    <text x="788" y="450" font-size="11" text-anchor="end">吴师兄大模型</text>
  </g>
</svg>
